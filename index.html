<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>安星租車預約/詢價 系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    .justify-text { text-align: justify; text-justify: inter-ideograph; }
    .swal-custom-radius { border-radius: 20px !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #553f62; border-radius: 10px; }
    .hidden-block { display: none !important; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    input:focus, select:focus, textarea:focus { border-color: #553f62 !important; box-shadow: 0 0 0 1px #553f62; }
    
    select, input, button {
      font-size: 16px !important;
    }
  </style>
</head>
<body class="bg-[#e9e7ef] text-black font-sans antialiased">
  
  <!-- LINE 成功過場 -->
  <div id="view-done" class="hidden-block min-h-screen bg-[#553f62] flex flex-col items-center justify-center text-white text-center p-6">
    <svg class="w-20 h-20 mb-4 animate-pulse mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <h2 class="text-2xl font-black tracking-widest">預約已送出</h2>
    <p class="mt-4 font-bold opacity-90">正在發送預約明細至 LINE 聊天室...</p>
  </div>

  <!-- 成功畫面 -->
  <div id="view-success" class="hidden-block pb-10 text-[#222] min-h-screen bg-[#e9e7ef] flex flex-col">
    <header class="bg-[#553f62] text-white p-4 sticky top-0 z-50 shadow-md flex justify-center items-center text-center">
      <h1 class="text-xl font-bold tracking-wider uppercase">預約完成</h1>
    </header>
    <main class="max-w-md w-full mx-auto mt-8 p-6 text-center">
      <div class="bg-white p-8 rounded-lg shadow-xl border border-gray-100 text-left">
        <svg class="w-16 h-16 text-green-500 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <h2 class="text-2xl font-black text-[#553f62] mb-4 text-center">預約資料已成功送出</h2>
        <div class="space-y-4">
          <div class="bg-gray-50 p-4 rounded border border-gray-200 text-sm font-bold text-gray-800 italic text-center">
            您的預約已成功送出。請您耐心等候客服回覆，感謝配合。
          </div>
          <div class="relative pt-4">
            <span class="absolute -top-2 left-3 bg-white px-2 text-[10px] font-bold text-gray-400">預約明細備份</span>
            <div id="fallback-message" class="bg-[#e9e7ef] border border-gray-200 p-4 rounded-md text-[13px] text-gray-700 font-mono whitespace-pre-wrap overflow-y-auto max-h-[40vh]"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="view-form" class="pb-10 text-[#222]">
    <header class="bg-[#553f62] text-white p-4 sticky top-0 z-50 shadow-md flex justify-center items-center text-center">
      <h1 class="text-xl font-bold tracking-wider uppercase">安星租車預約/詢價 系統</h1>
      <button onclick="window.location.reload()" class="absolute right-4 hover:rotate-180 transition-transform duration-500">
        <svg id="refresh-icon" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </header>

    <main class="max-w-md mx-auto mt-6 bg-white shadow-lg p-6 sm:p-8 border border-gray-200 rounded-sm">
      <form id="reservation-form" class="space-y-6">
        
        <div class="bg-[#553f62]/5 p-3 flex justify-between items-center border border-[#553f62]/20 rounded-sm">
          <span class="text-sm font-bold text-[#553f62] flex items-center gap-2">預約編號</span>
          <span id="display-reservationId" class="font-mono text-sm font-bold text-[#553f62]"></span>
        </div>

        <section class="space-y-4">
          <h2 class="text-lg font-bold border-b-2 border-[#553f62] pb-2 text-[#553f62]">乘車人資訊</h2>
          <div class="flex gap-2">
            <input type="text" id="name" class="flex-1 p-3 border rounded-sm outline-none bg-white" placeholder="乘車人姓名" required>
            <select id="title" class="p-3 border rounded-sm outline-none bg-white">
              <option>先生</option>
              <option>小姐</option>
            </select>
          </div>
          <input type="tel" id="phone" class="w-full p-3 border rounded-sm font-mono outline-none bg-white" placeholder="聯絡電話 09xxxxxxxx" maxlength="10" required>
          <input type="email" id="email" class="w-full p-3 border rounded-sm outline-none bg-white text-[13px]" placeholder="電子信箱 (選填)">

          <div class="pt-2 border-t border-gray-100 mt-2 relative">
            <label class="block text-base font-bold text-gray-700 mb-1">接送地址</label>
            <input type="text" id="district" class="w-full p-3 border bg-gray-100 text-gray-600 rounded-sm mb-2 font-bold text-sm outline-none" readonly placeholder="行政區域 (自動解析)">
            <input type="text" id="address" class="w-full p-3 border bg-white font-bold rounded-sm mb-4 outline-none" placeholder="請輸入詳細地址並從選單選取" required>

            <div class="mt-2 p-3 border border-dashed border-[#553f62] rounded-sm bg-gray-50">
              <label class="flex items-center gap-2 cursor-pointer font-black text-[#553f62] text-sm">
                <input type="checkbox" id="hasExtraPoint" class="w-5 h-5 accent-[#553f62]"> 需加點服務
              </label>
              <div id="extra-point-block" class="hidden-block mt-4 space-y-2">
                <input type="text" id="extraDistrict" class="w-full p-3 border bg-gray-100 text-gray-600 rounded-sm font-bold text-sm outline-none" readonly placeholder="加點區域 (自動解析)">
                <input type="text" id="extraAddress" class="w-full p-3 border bg-white font-bold rounded-sm outline-none" placeholder="加點詳細地址 (請從選單選取)">
              </div>
            </div>
          </div>
        </section>

        <section class="space-y-4">
          <h2 class="text-lg font-bold border-b-2 border-[#553f62] pb-2 text-[#553f62]">乘車資訊</h2>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">
              乘車日期 <span class="text-red-600 text-[12px] font-bold">(請預約 24 小時後)</span>
            </label>
            <input type="date" id="date" class="w-full p-3 border rounded-sm outline-none bg-white text-gray-700" required>
          </div>
          <div class="flex gap-2">
            <div class="flex-1">
                <label class="block text-[11px] font-bold text-gray-400 mb-1 ml-1">時 (24H)</label>
                <select id="timeHour" class="w-full p-3 border bg-white rounded-sm"></select>
            </div>
            <div class="flex-1">
                <label class="block text-[11px] font-bold text-gray-400 mb-1 ml-1">分</label>
                <select id="timeMinute" class="w-full p-3 border bg-white rounded-sm"></select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <select id="serviceType" class="p-3 border font-bold rounded-sm bg-white">
              <option value="送機">送機</option>
              <option value="接機">接機 (+$200)</option>
            </select>
            <select id="airport" class="p-3 border font-bold rounded-sm bg-white">
              <option>桃園機場</option>
              <option>松山機場</option>
              <option>台中機場</option>
            </select>
          </div>
          <input type="text" id="flightNumber" class="w-full p-3 border uppercase font-mono rounded-sm outline-none bg-white" placeholder="航班編號 EX: BR123">
        </section>

        <section class="space-y-4">
          <h2 class="text-lg font-bold border-b-2 border-[#553f62] pb-2 flex items-start gap-2 text-[#553f62]">車型與人數行李</h2>
          <select id="carType" class="w-full p-3 border font-bold rounded-sm bg-white">
            <option value="小車">小車 (1-4人)</option>
            <option value="大車">大車 (1-6人)</option>
            <option value="豪華車 (SIENNA/BENZ V)">豪華車 (SIENNA/BENZ V)</option>
          </select>
          <p id="carType-msg" class="text-[11px] font-bold text-red-600 hidden-block bg-red-50 p-2 rounded"></p>
          
          <div class="grid grid-cols-3 gap-2 text-center text-[11px] font-bold text-gray-700">
            <div>大人<select id="adults" class="w-full p-3 border bg-white text-base mt-1"></select></div>
            <div>中 (4-12歲)<select id="children" class="w-full p-3 border bg-white text-base mt-1"></select></div>
            <div>小 (4歲以下)<select id="infants" class="w-full p-3 border bg-white text-base mt-1"></select></div>
          </div>
          <div class="grid grid-cols-2 gap-2 text-center text-[11px] font-bold text-gray-700">
            <div>登機箱<select id="carryOn" class="w-full p-3 border bg-white text-base mt-1"></select></div>
            <div>託運箱<select id="checkedBag" class="w-full p-3 border bg-white text-base mt-1"></select></div>
          </div>
          
          <div id="child-seats-block" class="hidden-block mt-3 p-3 border border-dashed border-red-300 rounded-sm bg-red-50">
            <label class="block text-[13px] font-bold text-red-600 mb-2">👶 安全座椅/增高墊數量：</label>
            <div class="space-y-2 text-[12px] font-bold text-gray-700">
              <div class="flex justify-between items-center">
                <span>反向安全座椅</span>
                <select id="babySeat" class="p-1 border bg-white w-16 text-center"></select>
              </div>
              <div class="flex justify-between items-center">
                <span>正向兒童座椅</span>
                <select id="childSeat" class="p-1 border bg-white w-16 text-center"></select>
              </div>
              <div class="flex justify-between items-center">
                <span>增高坐墊</span>
                <select id="boosterSeat" class="p-1 border bg-white w-16 text-center"></select>
              </div>
            </div>
          </div>
          <p id="limit-msg" class="text-[11px] font-bold text-red-600 hidden-block bg-red-50 p-2 rounded text-center"></p>
        </section>

        <section class="space-y-4">
          <h2 class="text-lg font-bold border-b-2 border-[#553f62] pb-2 text-[#553f62]">費用報價</h2>
          <div class="space-y-1">
            <label class="block text-sm font-bold text-gray-700 mb-1">付款方式</label>
            <select id="payment" class="w-full p-3 border font-bold rounded-sm bg-white">
              <option value="轉帳">轉帳</option>
              <option value="現金">現金 (限熟客)</option>
              <option value="街口/全支付刷卡(+$30)">街口/全支付刷卡 +$30</option>
            </select>
          </div>

          <div class="p-3 border rounded-sm bg-gray-50">
            <label class="flex items-center gap-2 cursor-pointer font-bold text-gray-700">
              <input type="checkbox" id="extraSignboard" class="w-5 h-5 accent-[#553f62]"> 舉牌服務 (+$200)
            </label>
            <input type="text" id="signboardText" class="w-full mt-2 p-3 border rounded-sm outline-none bg-white hidden-block" placeholder="舉牌文字 (必填)">
          </div>

          <div class="bg-[#553f62] text-white p-6 rounded-sm shadow-xl font-mono overflow-hidden relative">
            <div class="absolute top-0 right-0 w-24 h-24 bg-white/5 -mr-12 -mt-12 rounded-full"></div>
            <h3 class="text-sm font-black border-b border-white/20 pb-2 mb-4 uppercase tracking-widest relative z-10">報價明細</h3>
            <div class="space-y-4 relative z-10">
              <div class="flex justify-between items-start">
                <div class="flex flex-col text-left">
                  <span id="display-carType-name" class="font-bold text-base text-white">基本車資</span>
                  <span id="display-route" class="text-xs text-white/70 italic">未選地區 ↔ 機場</span>
                </div>
                <span id="display-basePrice" class="font-bold text-xl text-white">待報價</span>
              </div>
              <div id="fees-block" class="border-t border-dashed border-white/30 pt-4 space-y-2.5 text-sm"></div>
              <div class="mt-8 pt-5 border-t-2 border-white/30 flex justify-between items-center">
                <span class="font-black text-white text-lg">預估總額</span>
                <div class="text-right">
                  <span id="display-total" class="text-4xl font-black text-white">待報價</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="space-y-4">
          <h2 class="text-lg font-bold border-b-2 border-[#553f62] pb-2 text-[#553f62]">其他備註</h2>
          <textarea id="userRemarks" rows="4" class="w-full p-3 border rounded-sm outline-none text-sm" placeholder="如攜帶紙箱、胖胖箱、雪板、輪椅等，請告知。"></textarea>
        </section>

        <section class="mt-4 border-t-2 border-[#553f62] pt-6 pb-4">
          <label class="flex items-start gap-3 cursor-pointer p-4 border border-[#553f62] font-black text-sm bg-white rounded-sm hover:bg-gray-50">
            <input type="checkbox" id="agreed" class="w-6 h-6 mt-0.5 accent-[#553f62]"> 
            <span>我已確認預約資訊與費用，並同意遵守乘車規範。</span>
          </label>
        </section>
        
        <button type="submit" id="submit-btn" class="w-full py-5 text-xl font-black rounded-sm shadow-lg bg-[#553f62] text-white hover:opacity-90 active:scale-95 transition-all">
          確認預約並送出
        </button>
      </form>
    </main>
  </div>

  <script>
    const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw3f9c-0uWgQgnrC1jWlmuvIuSPhcgTmIbwanvq2fBPj22-P6p-mc1kUBSxFJpmm56G/exec';
    const GOOGLE_MAPS_API_KEY = 'AIzaSyAxYym5ZR8puPb0iiycHdwzTJTKH0Aears';
    const LINE_LIFF_ID = '2009792282-1qTp0cNm';

    const state = {
      reservationId: '', name: '', title: '先生', phone: '', email: '', district: '', address: '',
      hasExtraPoint: false, extraDistrict: '', extraAddress: '', extraDistanceKm: 0,
      date: '', timeHour: '12', timeMinute: '00', serviceType: '送機', airport: '桃園機場', flightNumber: '',
      carType: '小車', adults: 1, children: 0, infants: 0, carryOn: 0, checkedBag: 0,
      babySeat: 0, childSeat: 0, boosterSeat: 0,
      payment: '轉帳', extraSignboard: false, signboardText: '', userRemarks: '', priceMap: {}
    };

    const DOM = {
      displayId: document.getElementById('display-reservationId'),
      hasExtraPoint: document.getElementById('hasExtraPoint'),
      extraPointBlock: document.getElementById('extra-point-block'),
      date: document.getElementById('date'),
      timeHour: document.getElementById('timeHour'),
      timeMinute: document.getElementById('timeMinute'),
      carType: document.getElementById('carType'),
      carTypeMsg: document.getElementById('carType-msg'),
      limitMsg: document.getElementById('limit-msg'),
      adults: document.getElementById('adults'),
      children: document.getElementById('children'),
      infants: document.getElementById('infants'),
      carryOn: document.getElementById('carryOn'),
      checkedBag: document.getElementById('checkedBag'),
      childSeatsBlock: document.getElementById('child-seats-block'),
      babySeat: document.getElementById('babySeat'),
      childSeat: document.getElementById('childSeat'),
      boosterSeat: document.getElementById('boosterSeat'),
      displayBasePrice: document.getElementById('display-basePrice'),
      displayTotal: document.getElementById('display-total'),
      feesBlock: document.getElementById('fees-block'),
      submitBtn: document.getElementById('submit-btn'),
      payment: document.getElementById('payment'),
      extraSignboard: document.getElementById('extraSignboard'),
      signboardText: document.getElementById('signboardText')
    };

    /* 強制清除所有「台灣」字眼 */
    function cleanAll(str) {
      if (!str) return "";
      return str.replace(/台灣|臺灣/g, '').trim();
    }

    /* 提取核心字眼 */
    function getCore(str) {
      if (!str) return "";
      let s = cleanAll(str).replace(/\d+/g, '');
      return s.replace(/市|縣|區|鄉|鎮/g, '').trim();
    }

    function generateId() {
      const d = new Date();
      const random = Math.random().toString(36).substring(2, 5).toUpperCase();
      return `AS${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}${random}`;
    }

    /* 24小時預約須知彈窗 */
    function showNotice() {
      const hasSeenNotice = sessionStorage.getItem('hasSeenNotice');
      if (!hasSeenNotice) {
        Swal.fire({
          title: '專車預約須知',
          html: `
            <div style="color: #202020; font-size: 15px; line-height: 1.6; text-align: left; margin-top: 10px;">
              為確保行程順利，線上預約需於出發時間前 <strong>24 小時</strong> 完成。<br><br>
              <span style="color: #f07cad; font-weight: bold;">【急單處理】</span><br>
              24 小時內之需求請直撥：<br>
              <div style="text-align: center; margin-top: 15px;">
                <a href="tel:0955311306" style="color: #553f62; font-size: 22px; font-weight: bold; text-decoration: none; display: inline-block; padding: 5px 25px; border: 2px solid #553f62; border-radius: 25px;">0955-311-306</a>
              </div>
            </div>
          `,
          icon: 'info',
          confirmButtonText: '我已了解',
          confirmButtonColor: '#553f62',
          customClass: { popup: 'swal-custom-radius' },
          allowOutsideClick: false
        }).then((result) => {
          if (result.isConfirmed) sessionStorage.setItem('hasSeenNotice', 'true');
        });
      }
    }

    /* 積分權重匹配演算法 - 解決行政區層級衝突 */
    function findPriceData(airport, locString) {
      if (!locString || Object.keys(state.priceMap).length === 0) return null;
      
      const aptPrefix = airport.replace('機場','');
      const userFull = cleanAll(locString.replace(/\s+/g,''));
      const userZip = userFull.match(/\d{3}/)?.[0] || '';
      const userCore = getCore(userFull);

      const candidates = Object.keys(state.priceMap).filter(k => {
        const apt = k.split('_')[0];
        return apt.includes(aptPrefix) || aptPrefix.includes(apt);
      }).map(k => {
        const item = state.priceMap[k];
        const itemFull = cleanAll((k.split('_')[1] || '').replace(/\s+/g,''));
        const itemZip = item.b || itemFull.match(/\d{3}/)?.[0] || '';
        const itemCore = getCore(itemFull);
        
        let score = 0;
        
        // 1. 郵遞區號命中 (+100)
        if (userZip && itemZip === userZip) score += 100;
        
        // 2. 核心地名精準匹配 (+500)
        if (userCore && itemCore && (userCore === itemCore)) score += 500;
        
        // 3. 包含關係 (模糊匹配)
        if (userFull.includes(itemFull)) score += (20 + itemFull.length);
        if (itemFull.includes(userFull)) score += (10 + userFull.length);

        return { key: k, score };
      }).filter(x => x.score > 0);

      if (candidates.length > 0) {
        candidates.sort((a, b) => b.score - a.score); 
        return state.priceMap[candidates[0].key];
      }
      return null;
    }

    function calculatePrice() {
      const mainMatch = findPriceData(state.airport, state.district);
      const extraMatch = state.hasExtraPoint ? findPriceData(state.airport, state.extraDistrict) : null;
      
      const getVal = (item) => {
        if (!item) return 0;
        const cType = state.carType;
        if (cType.includes('大車')) return parseInt(String(item.e || item['大車']).replace(/\D/g,'')) || 0;
        if (cType.includes('豪華車')) return parseInt(String(item.f || item['豪華車']).replace(/\D/g,'')) || 0;
        return parseInt(String(item.d || item['小車']).replace(/\D/g,'')) || 0;
      };

      const p1 = getVal(mainMatch), p2 = getVal(extraMatch);
      const base = state.hasExtraPoint ? Math.max(p1, p2) : p1;
      const matchedName = (state.hasExtraPoint && p2 > p1) ? (extraMatch ? extraMatch.c : state.extraDistrict) : (mainMatch ? mainMatch.c : state.district);

      let extraDistFee = 0;
      if (state.hasExtraPoint && state.extraDistanceKm > 0) {
        const c1 = getCore(state.district);
        const c2 = getCore(state.extraDistrict);
        extraDistFee = (c1 === c2 ? 0 : 200) + (Math.max(1, Math.ceil(state.extraDistanceKm / 5)) * 100);
      }

      const fees = {
        pk: state.serviceType === '接機' ? 200 : 0,
        nt: (parseInt(state.timeHour) >= 22 || parseInt(state.timeHour) < 6) ? 200 : 0,
        sb: state.extraSignboard ? 200 : 0,
        ex: extraDistFee,
        tf: state.payment.includes('刷卡') ? 30 : 0,
        seats: (state.babySeat + state.childSeat + state.boosterSeat) * 200
      };

      const totalValue = base > 0 ? (base + Object.values(fees).reduce((a,b)=>a+b,0)) : null;
      
      document.getElementById('display-carType-name').innerText = `基本車資 (${state.carType.split(' ')[0]})`;
      document.getElementById('display-route').innerText = `${cleanAll(matchedName) || '未選地區'} ↔ ${state.airport}`;
      DOM.displayBasePrice.innerText = base ? `$${base}` : '待報價';
      DOM.displayTotal.innerText = totalValue ? `$${totalValue}` : '待報價';

      DOM.feesBlock.innerHTML = '';
      if(fees.pk) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 接機費</span><span>+$200</span></div>`;
      if(fees.nt) DOM.feesBlock.innerHTML += `<div class="flex justify-between text-yellow-200"><span>└ 夜間加成 (22:00-06:00)</span><span>+$200</span></div>`;
      if(state.babySeat > 0) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 反向座椅 x${state.babySeat}</span><span>+$${state.babySeat * 200}</span></div>`;
      if(state.childSeat > 0) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 正向座椅 x${state.childSeat}</span><span>+$${state.childSeat * 200}</span></div>`;
      if(state.boosterSeat > 0) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 增高墊 x${state.boosterSeat}</span><span>+$${state.boosterSeat * 200}</span></div>`;
      if(fees.ex > 0) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 加點里程費</span><span>+$${fees.ex}</span></div>`;
      if(fees.sb > 0) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 舉牌服務</span><span>+$200</span></div>`;
      if(fees.tf > 0) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 刷卡手續費</span><span>+$30</span></div>`;
    }

    function updateExtraDistance() {
      if (!state.hasExtraPoint || !state.address || !state.extraAddress || !window.google) {
        state.extraDistanceKm = 0; calculatePrice(); return;
      }
      const svc = new google.maps.DistanceMatrixService();
      svc.getDistanceMatrix({
        origins: [`${state.district} ${state.address}`],
        destinations: [`${state.extraDistrict} ${state.extraAddress}`],
        travelMode: 'DRIVING'
      }, (res, status) => {
        if (status === 'OK') {
          const el = res.rows[0].elements[0];
          state.extraDistanceKm = el.status === 'OK' ? el.distance.value / 1000 : 0;
        }
        calculatePrice();
      });
    }

    function initGoogleMaps() {
      const parse = (place, dId, aId) => {
        const comps = place.address_components || [];
        const full = cleanAll(place.formatted_address || "");
        let zip = (comps.find(c=>c.types.includes('postal_code'))?.long_name || "").substring(0,3);
        let city = cleanAll(comps.find(c=>c.types.includes('administrative_area_level_1'))?.long_name || "");
        let area = (comps.find(c=>c.types.includes('sublocality_level_1')) || comps.find(c=>c.types.includes('locality')))?.long_name || "";
        
        if (full.includes("香山")) { zip="300"; city="新竹市"; area="香山區"; }
        
        state[dId] = `${zip} ${city} ${area}`.trim();
        state[aId] = cleanAll(place.name || "");
        document.getElementById(dId).value = state[dId];
        calculatePrice();
        updateExtraDistance();
      };

      const setupAC = (id, dId, aId) => {
        const ac = new google.maps.places.Autocomplete(document.getElementById(id), { componentRestrictions:{country:'tw'} });
        ac.addListener('place_changed', () => {
          const p = ac.getPlace();
          if (p && p.address_components) parse(p, dId, aId);
        });
      };

      if (!window.google) {
        const s = document.createElement('script');
        s.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=places&language=zh-TW`;
        s.onload = () => { setupAC('address','district','address'); setupAC('extraAddress','extraDistrict','extraAddress'); };
        document.head.appendChild(s);
      } else { 
        setupAC('address','district','address'); setupAC('extraAddress','extraDistrict','extraAddress'); 
      }
    }

    async function loadPrices() {
      try {
        const res = await fetch(`${GAS_WEBAPP_URL}?action=getPrices&t=${Date.now()}`);
        const d = await res.json();
        if (d.status === 'success') { 
          const prices = {};
          d.prices.forEach(it => prices[`${it.a}_${it.c}`] = it);
          state.priceMap = prices; 
          calculatePrice(); 
        }
      } catch(e) { console.warn('報價載入失敗'); }
    }

    window.onload = () => {
      state.reservationId = generateId();
      DOM.displayId.innerText = state.reservationId;
      for(let i=0; i<24; i++) DOM.timeHour.add(new Option(String(i).padStart(2,'0'), String(i).padStart(2,'0')));
      for(let i=0; i<60; i+=5) DOM.timeMinute.add(new Option(String(i).padStart(2,'0'), String(i).padStart(2,'0')));
      DOM.timeHour.value = "12"; DOM.timeMinute.value = "00";
      
      showNotice(); // 確保找回提醒
      loadPrices();
      initGoogleMaps();
      if(typeof liff !== 'undefined') {
        liff.init({ liffId: LINE_LIFF_ID }).catch(e => console.error(e));
      }
    };

    function updateOptions() {
      const render = (el, max) => {
        const val = el.value; el.innerHTML = '';
        for(let i=0; i<=max; i++) el.add(new Option(i,i));
        el.value = (parseInt(val) <= max) ? val : 0;
      };
      render(DOM.adults, 6); render(DOM.children, 6); render(DOM.infants, 4);
      render(DOM.carryOn, 6); render(DOM.checkedBag, 6);
      
      const tp = (parseInt(DOM.adults.value)||0) + (parseInt(DOM.children.value)||0) + (parseInt(DOM.infants.value)||0);
      const tl = (parseInt(DOM.carryOn.value)||0) + (parseInt(DOM.checkedBag.value)||0);
      const infants = parseInt(DOM.infants.value) || 0;
      const children = parseInt(DOM.children.value) || 0;
      
      render(DOM.babySeat, infants); render(DOM.childSeat, infants); render(DOM.boosterSeat, children);
      state.infants = infants; state.children = children;
      state.babySeat = parseInt(DOM.babySeat.value) || 0;
      state.childSeat = parseInt(DOM.childSeat.value) || 0;
      state.boosterSeat = parseInt(DOM.boosterSeat.value) || 0;

      if (infants > 0 || children > 0) DOM.childSeatsBlock.classList.remove('hidden-block');
      else DOM.childSeatsBlock.classList.add('hidden-block');

      if (tp > 6 || tl > 6) {
          DOM.limitMsg.innerText = `⚠️ 警告：超過承載上限 (6人6件)。`;
          DOM.limitMsg.classList.remove('hidden-block');
          DOM.submitBtn.disabled = true;
      } else {
          DOM.limitMsg.classList.add('hidden-block');
          DOM.submitBtn.disabled = false;
      }
      
      if((tp > 4) || (tp === 4 && infants > 0)) { 
        state.carType = '大車'; DOM.carType.value = '大車'; DOM.carType.disabled = true; 
        DOM.carTypeMsg.classList.remove('hidden-block'); 
      } else { 
        DOM.carType.disabled = false; 
        DOM.carTypeMsg.classList.add('hidden-block'); 
      }
      calculatePrice();
    }

    ['name','email','date','timeHour','timeMinute','serviceType','airport','carType','payment','flightNumber'].forEach(id => {
      document.getElementById(id).addEventListener('change', (e) => { state[id] = e.target.value; calculatePrice(); });
    });
    
    document.getElementById('phone').oninput = (e) => { e.target.value = e.target.value.replace(/\D/g, '').slice(0, 10); state.phone = e.target.value; };
    [DOM.adults, DOM.children, DOM.infants, DOM.carryOn, DOM.checkedBag].forEach(el => el.onchange = updateOptions);
    [DOM.babySeat, DOM.childSeat, DOM.boosterSeat].forEach(el => {
        el.onchange = (e) => { state[e.target.id] = parseInt(e.target.value) || 0; calculatePrice(); };
    });
    
    DOM.hasExtraPoint.onchange = (e) => { 
      state.hasExtraPoint = e.target.checked; 
      DOM.extraPointBlock.className = e.target.checked ? 'mt-4 space-y-2' : 'hidden-block'; 
      updateExtraDistance(); 
    };
    
    DOM.extraSignboard.onchange = (e) => {
      state.extraSignboard = e.target.checked;
      DOM.signboardText.className = e.target.checked ? 'w-full mt-2 p-3 border rounded-sm outline-none bg-white' : 'hidden-block';
      calculatePrice();
    };
    
    DOM.signboardText.oninput = (e) => { state.signboardText = e.target.value; };
    document.getElementById('userRemarks').oninput = (e) => { state.userRemarks = e.target.value; };

    document.getElementById('reservation-form').onsubmit = async (e) => {
      e.preventDefault();
      if (!state.name || state.phone.length < 10 || !state.district) {
        return Swal.fire({title:'資訊不完整', text:'請填寫姓名、電話並選取正確地址', icon:'error'});
      }
      if (!document.getElementById('agreed').checked) {
        return Swal.fire({title:'提醒', text:'請勾選同意條款', icon:'info'});
      }

      DOM.submitBtn.disabled = true; 
      DOM.submitBtn.innerText = "正在處理中...";
      
      const seatMsg = [];
      if(state.babySeat > 0) seatMsg.push(`反向安全座椅x${state.babySeat}`);
      if(state.childSeat > 0) seatMsg.push(`正向兒童座椅x${state.childSeat}`);
      if(state.boosterSeat > 0) seatMsg.push(`增高墊x${state.boosterSeat}`);
      const seatStr = seatMsg.length > 0 ? seatMsg.join(', ') : '無';

      const mainAddr = cleanAll(`${state.district} ${state.address}`);
      const extraAddr = state.hasExtraPoint ? cleanAll(`${state.extraDistrict} ${state.extraAddress}`) : '無';

      const msg = `【安星租車 預約成功】\n` +
                  `預約編號：${state.reservationId}\n` +
                  `乘車人：${state.name} ${state.title}\n` +
                  `聯絡電話：${formatPhone(state.phone)}\n` +
                  `乘車日期：${state.date} ${state.timeHour}:${state.timeMinute}\n` +
                  `行程內容：${state.serviceType} (${state.airport})\n` +
                  `出發地點：${mainAddr}\n` +
                  `加點地址：${extraAddr}\n` +
                  `預約車型：${state.carType}\n` +
                  `乘客人數：${state.adults}大 / ${state.children}中 / ${state.infants}小\n` +
                  `設備/行李：${seatStr} / ${state.carryOn}登 ${state.checkedBag}託\n` +
                  `費用總額：${DOM.displayTotal.innerText}\n` +
                  `備註事項：${state.userRemarks || '無'}`;

      const postData = {
        action: 'addReservation',
        data: {
          timestamp: new Date().toLocaleString('zh-TW', {hour12: false}),
          reservationId: state.reservationId,
          name: `${state.name} ${state.title}`,
          phone: formatPhone(state.phone),
          date: state.date,
          time: `${state.timeHour}:${state.timeMinute}`,
          mainAddress: mainAddr,
          extraAddress: extraAddr,
          carType: state.carType,
          totalFee: DOM.displayTotal.innerText,
          remarks: state.userRemarks || '無'
        }
      };

      try {
        await fetch(GAS_WEBAPP_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(postData) });
        if (window.liff && liff.isInClient()) {
          await liff.sendMessages([{type:'text', text:msg}, {type:'text', text: `已收到您的預約。`}]);
          document.getElementById('view-form').classList.add('hidden-block');
          document.getElementById('view-done').classList.replace('hidden-block','flex');
          setTimeout(() => liff.closeWindow(), 3000);
        } else {
          document.getElementById('view-form').classList.add('hidden-block');
          document.getElementById('view-success').classList.remove('hidden-block');
          document.getElementById('fallback-message').innerText = msg;
        }
      } catch(err) { 
        Swal.fire({title:'傳送失敗', text:'請稍後重試', icon:'error'}); 
        DOM.submitBtn.disabled = false; 
      }
    };
    updateOptions();
  </script>
</body>
</html>
