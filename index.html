<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>安星租車預約/詢價 系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    .justify-text { text-align: justify; text-justify: inter-ideograph; }
    .swal-custom-radius { border-radius: 20px !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #553f62; border-radius: 10px; }
    .hidden-block { display: none !important; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body class="bg-[#e9e7ef] text-black font-sans">
  
  <!-- LINE 成功過場 -->
  <div id="view-done" class="hidden-block min-h-screen bg-[#553f62] flex-col items-center justify-center text-white text-center p-6">
     <svg class="w-20 h-20 mb-4 animate-pulse mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
     <h2 class="text-2xl font-black tracking-widest">預約已送出</h2>
     <p class="mt-4 font-bold opacity-90">正在發送預約明細至 LINE 聊天室...</p>
  </div>

  <!-- 外部瀏覽器成功畫面 -->
  <div id="view-success" class="hidden-block pb-10 text-[#222] min-h-screen bg-[#e9e7ef] flex-col">
    <header class="bg-[#553f62] text-white p-4 sticky top-0 z-50 shadow-md flex justify-center items-center text-center">
      <h1 class="text-xl font-bold tracking-wider uppercase">預約完成</h1>
    </header>
    <main class="max-w-md w-full mx-auto mt-8 p-6 text-center">
      <div class="bg-white p-8 rounded-lg shadow-xl border border-gray-100 text-left">
        <svg class="w-16 h-16 text-green-500 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <h2 class="text-2xl font-black text-[#553f62] mb-4 text-center">預約資料已成功送出</h2>
        <div class="space-y-4">
          <div class="bg-gray-50 p-4 rounded border border-gray-200 text-sm font-bold text-gray-800 italic text-center">
            您的預約已成功送出。請您耐心等候，待客服人員為您確認訂單內容無誤後，將回傳轉帳帳號／刷卡QR Code以利完成付款，感謝您的配合。
          </div>
          <div class="relative pt-4">
            <span class="absolute top-1 left-3 bg-white px-2 text-[10px] font-bold text-gray-400">預約明細備份</span>
            <div id="fallback-message" class="bg-[#e9e7ef] border border-gray-200 p-4 rounded-md text-[13px] text-gray-700 font-mono whitespace-pre-wrap overflow-y-auto max-h-[40vh]"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 主表單區域 -->
  <div id="view-form" class="pb-10 text-[#222]">
    <header class="bg-[#553f62] text-white p-4 sticky top-0 z-50 shadow-md flex justify-center items-center text-center">
      <h1 class="text-xl font-bold tracking-wider uppercase">安星租車預約/詢價 系統</h1>
      <button onclick="window.location.reload()" class="absolute right-4">
        <svg id="refresh-icon" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </header>

    <main class="max-w-md mx-auto mt-6 bg-white shadow-lg p-6 sm:p-8 sm:border border-gray-200">
      <form id="reservation-form" class="space-y-6">
        
        <!-- 預約編號 -->
        <div class="bg-[#553f62]/5 p-3 flex justify-between items-center border border-[#553f62]/20">
          <span class="text-sm font-bold text-[#553f62] flex items-center gap-2">預約編號</span>
          <span id="display-reservationId" class="font-mono text-sm font-bold text-[#553f62]"></span>
        </div>

        <!-- 乘車人資訊 -->
        <section class="space-y-4">
          <h2 class="text-lg font-bold border-b-2 border-[#553f62] pb-2 text-[#553f62]">乘車人資訊</h2>
          <div class="flex gap-2">
            <input type="text" id="name" class="flex-1 p-3 border rounded-sm outline-none focus:border-[#553f62] bg-white text-base" placeholder="全名">
            <select id="title" class="p-3 border rounded-sm outline-none focus:border-[#553f62] bg-white text-base">
              <option>先生</option>
              <option>小姐</option>
            </select>
          </div>
          <input type="tel" id="phone" class="w-full p-3 border rounded-sm font-mono outline-none focus:border-[#553f62] bg-white text-base" placeholder="聯絡電話 09xxxxxxxx" maxlength="10">
          <input type="email" id="email" class="w-full p-3 border rounded-sm outline-none focus:border-[#553f62] bg-white text-[12px]" placeholder="MAIL 電子信箱">

          <div class="pt-2 border-t border-gray-100 mt-2 relative">
            <label class="block text-base font-bold text-gray-700 mb-1">接送地址</label>
            <input type="text" id="district" class="w-full p-3 border bg-gray-100 text-gray-600 rounded-sm mb-2 font-bold text-sm outline-none" readonly placeholder="行政區域 (自動解析)">
            <input type="text" id="address" class="w-full p-3 border bg-white font-bold rounded-sm mb-4 outline-none focus:border-[#553f62] text-base" placeholder="輸入詳細地址並從下拉建議選取">

            <div class="mt-2 p-3 border border-dashed border-[#553f62] rounded-sm">
              <label class="flex items-center gap-2 cursor-pointer font-black text-[#553f62] text-sm">
                <input type="checkbox" id="hasExtraPoint" class="w-5 h-5 accent-[#553f62]"> 需加點服務
              </label>
              <div id="extra-point-block" class="hidden-block mt-4 space-y-2">
                <input type="text" id="extraDistrict" class="w-full p-3 border bg-gray-100 text-gray-600 rounded-sm font-bold text-sm outline-none" readonly placeholder="加點區域 (自動解析)">
                <input type="text" id="extraAddress" class="w-full p-3 border bg-white font-bold rounded-sm text-base focus:border-[#553f62] outline-none" placeholder="加點詳細地址 (從下拉建議選取)">
              </div>
            </div>
          </div>
        </section>

        <!-- 乘車資訊 -->
        <section class="space-y-4">
          <h2 class="text-lg font-bold border-b-2 border-[#553f62] pb-2 flex items-center gap-2 mt-8 text-[#553f62]">乘車資訊</h2>
          <label class="block text-sm font-bold text-gray-700">乘車日期 <span class="text-red-500 text-[11px]">(限 24 小時後)</span></label>
          <input type="date" id="date" class="w-full p-3 border rounded-sm outline-none focus:border-[#553f62] bg-white text-base text-gray-700">
          <div class="flex gap-2">
            <select id="timeHour" class="flex-1 p-3 border bg-white rounded-sm text-base"></select>
            <select id="timeMinute" class="flex-1 p-3 border bg-white rounded-sm text-base"></select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <select id="serviceType" class="p-3 border font-bold rounded-sm bg-white text-base">
              <option value="送機">送機</option>
              <option value="接機">接機 (+$200)</option>
            </select>
            <select id="airport" class="p-3 border font-bold rounded-sm bg-white text-base">
              <option>桃園機場</option>
              <option>松山機場</option>
              <option>台中機場</option>
            </select>
          </div>
          <input type="text" id="flightNumber" class="w-full p-3 border uppercase font-mono rounded-sm outline-none focus:border-[#553f62] bg-white text-base" placeholder="航班編號 EX: BR123">
        </section>

        <!-- 車型與人數行李 -->
        <section class="space-y-4">
          <h2 class="text-lg font-bold border-b-2 border-[#553f62] pb-2 flex items-start gap-2 mt-8 text-[#553f62]">車型與人數行李</h2>
          <select id="carType" class="w-full p-3 border font-bold rounded-sm bg-white text-base">
            <option value="小車">小車</option>
            <option value="大車">大車</option>
            <option value="豪華車">豪華車</option>
          </select>
          <p id="carType-msg" class="text-[11px] font-bold text-red-600 hidden-block"></p>
          
          <div class="grid grid-cols-3 gap-2 text-center text-[11px] font-bold text-gray-700">
            <div>大人<select id="adults" class="w-full p-3 border bg-white text-base"></select></div>
            <div>小孩(4~12歲)<select id="children" class="w-full p-3 border bg-white text-base"></select></div>
            <div>幼童(4歲下)<select id="infants" class="w-full p-3 border bg-white text-base"></select></div>
          </div>
          <div class="grid grid-cols-2 gap-2 text-center text-[11px] font-bold text-gray-700">
            <div>登機箱<select id="carryOn" class="w-full p-3 border bg-white text-base"></select></div>
            <div>託運(21吋+)<select id="checkedBag" class="w-full p-3 border bg-white text-base"></select></div>
          </div>
        </section>

        <!-- 費用報價明細 -->
        <section class="space-y-4">
          <h2 class="text-lg font-bold border-b-2 border-[#553f62] pb-2 flex items-center gap-2 mt-8 text-[#553f62]">費用報價</h2>
          
          <div class="space-y-1">
            <label class="block text-sm font-bold text-gray-700">付款方式</label>
            <select id="payment" class="w-full p-3 border font-bold rounded-sm outline-none focus:border-[#553f62] bg-white text-base">
              <option value="轉帳">轉帳</option>
              <option value="現金">現金</option>
              <option value="街口/全支付刷卡(+$30)">街口/全支付刷卡 +$30</option>
            </select>
          </div>

          <div class="p-3 border rounded-sm">
            <label class="flex items-center gap-2 cursor-pointer py-1 font-bold text-gray-700">
              <input type="checkbox" id="extraSignboard" class="w-5 h-5 accent-[#553f62]"> 舉牌服務 (+$200)
            </label>
            <input type="text" id="signboardText" class="w-full mt-2 p-3 border rounded-sm outline-none focus:border-[#553f62] bg-white text-base hidden-block" placeholder="請輸入舉牌內容 (必填)">
          </div>

          <div class="bg-[#553f62] text-white p-6 rounded-sm shadow-xl font-mono">
            <h3 class="text-sm font-black border-b border-white/20 pb-2 mb-4 uppercase tracking-widest">報價明細內容</h3>
            <div class="space-y-4">
              <div class="flex justify-between items-start">
                <div class="flex flex-col text-left">
                  <span id="display-carType-name" class="font-bold text-base text-white">基本車資</span>
                  <span id="display-route" class="text-xs text-white/70">未選地區 ↔ 機場</span>
                </div>
                <span id="display-basePrice" class="font-bold text-xl text-white text-right">待報價</span>
              </div>
              <div id="fees-block" class="border-t border-dashed border-white/30 pt-4 space-y-2.5 text-sm"></div>
              <div class="mt-8 pt-5 border-t-2 border-white/30 flex justify-between items-center">
                <span class="font-black text-white text-lg">預估總額</span>
                <div class="text-right">
                  <span id="display-total" class="text-4xl font-black text-white">待報價</span>
                  <div id="display-payment" class="text-xs text-white/70 mt-1 uppercase text-right">付款：轉帳</div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- 其他備註 -->
        <section class="space-y-4">
          <h2 class="text-lg font-bold border-b-2 border-[#553f62] pb-2 mt-8 text-[#553f62]">其他備註</h2>
          <textarea id="userRemarks" rows="3" class="w-full p-3 border rounded-sm outline-none focus:border-[#553f62] bg-white text-base" placeholder="如有特殊需求請在此註明..."></textarea>
        </section>

        <!-- 同意條款 -->
        <section class="mt-8 border-t-2 border-[#553f62] pt-6 pb-4">
          <label class="flex items-start gap-3 cursor-pointer p-4 border border-[#553f62] font-black text-sm bg-white rounded-sm shadow-sm">
            <input type="checkbox" id="agreed" class="w-6 h-6 mt-0.5 accent-[#553f62]"> 我已確認以上預約資訊與費用，並同意遵守相關乘車規範。
          </label>
        </section>
        
        <button type="submit" id="submit-btn" class="w-full py-5 text-xl font-black rounded-sm shadow-lg bg-[#553f62] text-white hover:opacity-90 active:scale-95">
          確認預約並送出
        </button>
      </form>
    </main>
  </div>

  <script>
    const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw3f9c-0uWgQgnrC1jWlmuvIuSPhcgTmIbwanvq2fBPj22-P6p-mc1kUBSxFJpmm56G/exec';
    const GOOGLE_MAPS_API_KEY = 'AIzaSyAxYym5ZR8puPb0iiycHdwzTJTKH0Aears';
    const LINE_LIFF_ID = '2009792282-1qTp0cNm';

    const state = {
      reservationId: '', name: '', title: '先生', phone: '', email: '', district: '', address: '',
      hasExtraPoint: false, extraDistrict: '', extraAddress: '', extraDistanceKm: 0,
      date: '', timeHour: '12', timeMinute: '00', serviceType: '送機', airport: '桃園機場', flightNumber: '',
      carType: '小車', adults: 1, children: 0, infants: 0, carryOn: 0, checkedBag: 0,
      payment: '轉帳', extraSignboard: false, signboardText: '', userRemarks: '', priceMap: {}
    };

    const DOM = {
      displayId: document.getElementById('display-reservationId'),
      hasExtraPoint: document.getElementById('hasExtraPoint'),
      extraPointBlock: document.getElementById('extra-point-block'),
      date: document.getElementById('date'),
      timeHour: document.getElementById('timeHour'),
      timeMinute: document.getElementById('timeMinute'),
      carType: document.getElementById('carType'),
      carTypeMsg: document.getElementById('carType-msg'),
      adults: document.getElementById('adults'),
      children: document.getElementById('children'),
      infants: document.getElementById('infants'),
      carryOn: document.getElementById('carryOn'),
      checkedBag: document.getElementById('checkedBag'),
      displayBasePrice: document.getElementById('display-basePrice'),
      displayTotal: document.getElementById('display-total'),
      feesBlock: document.getElementById('fees-block'),
      submitBtn: document.getElementById('submit-btn'),
      payment: document.getElementById('payment'),
      extraSignboard: document.getElementById('extraSignboard'),
      signboardText: document.getElementById('signboardText')
    };

    // 格式化電話: 0912345678 -> 0912-345-678
    function formatPhone(p) {
      if(!p) return "";
      const cleaned = p.replace(/\D/g, '');
      const match = cleaned.match(/^(\d{4})(\d{3})(\d{3})$/);
      if (match) return `${match[1]}-${match[2]}-${match[3]}`;
      return cleaned;
    }

    function generateId() {
      const d = new Date();
      return `AS${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}${Math.random().toString(36).substring(2, 5).toUpperCase()}`;
    }

    function findPriceData(airport, locString) {
      if (!locString || Object.keys(state.priceMap).length === 0) return null;
      const aptPrefix = airport.replace('機場','');
      const userNorm = locString.replace(/\s+/g,'').replace('台灣','').replace('苗票', '苗栗');
      const zipMatch = userNorm.match(/^(\d{3})/);
      const userZip = zipMatch ? zipMatch[1] : '';
      const areaMatch = userNorm.match(/[\u4e00-\u9fa5]{2,}(區|鄉|鎮|市)$/);
      const userArea = areaMatch ? areaMatch[0] : '';
      const cleanUserArea = userArea.replace(/區|鄉|鎮|市|縣/g, '');

      const available = Object.keys(state.priceMap).filter(k => {
        const apt = k.split('_')[0];
        return apt.includes(aptPrefix) || aptPrefix.includes(apt);
      }).map(k => {
        const part2 = k.split('_')[1] || '';
        return {
          key: k,
          norm: part2.replace(/\s+/g,'').replace('台灣',''),
          zip: state.priceMap[k].b || part2.match(/\d{3}/)?.[0] || '',
          text: part2.replace(/\d+/g,'').replace('台灣','')
        };
      });

      const targets = available.map(x => {
        let score = 0;
        if (x.norm === userNorm) score += 1000;
        if (userZip && x.zip === userZip) score += 100;
        const cleanXText = x.text.replace(/區|鄉|鎮|市|縣/g, '');
        if (cleanUserArea && cleanXText && (cleanXText.includes(cleanUserArea) || cleanUserArea.includes(cleanXText))) {
          score += 500;
        } else if (cleanXText && userNorm.includes(cleanXText)) {
          score += 10 * cleanXText.length;
        }
        return { ...x, score };
      }).filter(x => x.score > 0);

      if (targets.length > 0) {
        targets.sort((a, b) => b.score - a.score || b.text.length - a.text.length); 
        return state.priceMap[targets[0].key];
      }
      return null;
    }

    function calculatePrice() {
      const mainMatch = findPriceData(state.airport, state.district);
      const extraMatch = state.hasExtraPoint ? findPriceData(state.airport, state.extraDistrict) : null;
      
      const getVal = (item) => {
        if (!item) return 0;
        let v = (state.carType === '大車') ? (item.e || item['大車']) : (state.carType === '豪華車' ? (item.f || item['豪華車']) : (item.d || item['小車']));
        return parseInt(String(v).replace(/[^\d]/g, ''), 10) || 0;
      };

      const p1 = getVal(mainMatch), p2 = getVal(extraMatch);
      const base = state.hasExtraPoint ? Math.max(p1, p2) : p1;
      const matchedName = (state.hasExtraPoint && p2 > p1) ? (extraMatch ? extraMatch.c : state.extraDistrict) : (mainMatch ? mainMatch.c : state.district);

      let extraDistFee = 0, distLabel = "加點服務費";
      if (state.hasExtraPoint && state.extraDistanceKm > 0) {
        const c1 = state.district.replace(/\s+/g,'').match(/[\u4e00-\u9fa5]{3}/)?.[0] || "";
        const c2 = state.extraDistrict.replace(/\s+/g,'').match(/[\u4e00-\u9fa5]{3}/)?.[0] || "";
        const sameCity = (c1.substring(0,2) === c2.substring(0,2));
        extraDistFee = (sameCity ? 0 : 200) + (Math.max(1, Math.ceil(state.extraDistanceKm / 5)) * 100);
        distLabel = `加點 (${state.extraDistanceKm.toFixed(1)}km)`;
      }

      const infantsCount = parseInt(state.infants) || 0;
      const transFee = state.payment.includes('刷卡') ? 30 : 0;

      const fees = {
        pk: state.serviceType === '接機' ? 200 : 0,
        nt: (parseInt(state.timeHour) >= 22 || parseInt(state.timeHour) < 6) ? 200 : 0,
        if: infantsCount * 200,
        sb: state.extraSignboard ? 200 : 0,
        ex: extraDistFee,
        tf: transFee
      };

      const totalValue = base > 0 ? (base + Object.values(fees).reduce((a,b)=>a+b,0)) : null;
      const totalStr = totalValue ? `$${totalValue}` : '待報價';

      document.getElementById('display-carType-name').innerText = `基本車資 (${state.carType})`;
      document.getElementById('display-route').innerText = `${matchedName || '未選地區'} ↔ ${state.airport}`;
      DOM.displayBasePrice.innerText = base ? `$${base}` : '待報價';
      DOM.displayTotal.innerText = totalStr;
      document.getElementById('display-payment').innerText = `付款：${state.payment.split('(')[0]}`;

      DOM.feesBlock.innerHTML = '';
      if(fees.pk) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 接機費</span><span>+$200</span></div>`;
      if(fees.nt) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 夜間加成 (22-06)</span><span>+$200</span></div>`;
      if(fees.if > 0) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 安全座椅 x${infantsCount}</span><span>+$${fees.if}</span></div>`;
      if(fees.ex > 0) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ ${distLabel}</span><span>+$${fees.ex}</span></div>`;
      if(fees.sb > 0) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 舉牌服務</span><span>+$200</span></div>`;
      if(fees.tf > 0) DOM.feesBlock.innerHTML += `<div class="flex justify-between"><span>└ 刷卡手續費</span><span>+$30</span></div>`;
    }

    function updateExtraDistance() {
      if (!state.hasExtraPoint || !state.address || !state.extraAddress || !window.google) {
        state.extraDistanceKm = 0; calculatePrice(); return;
      }
      const svc = new google.maps.DistanceMatrixService();
      svc.getDistanceMatrix({
        origins: [`${state.district} ${state.address}`],
        destinations: [`${state.extraDistrict} ${state.extraAddress}`],
        travelMode: 'DRIVING'
      }, (res, status) => {
        if (status === 'OK') {
          const el = res.rows[0].elements[0];
          state.extraDistanceKm = el.status === 'OK' ? el.distance.value / 1000 : 0;
        }
        calculatePrice();
      });
    }

    function initGoogleMaps() {
      const parse = (place, dId, aId) => {
        const comps = place.address_components || [];
        const full = (place.formatted_address || "").replace('台灣','').trim();
        let zip = (comps.find(c=>c.types.includes('postal_code'))?.long_name || "").substring(0,3);
        let city = (comps.find(c=>c.types.includes('administrative_area_level_1'))?.long_name || "").replace('台灣','').trim();
        let area = (comps.find(c=>c.types.includes('sublocality_level_1')) || comps.find(c=>c.types.includes('locality')))?.long_name || "";
        
        if (full.includes("香山")) { zip="300"; city="新竹市"; area="香山區"; }
        else if (full.includes("北區") && (full.includes("新竹") || city.includes("新竹"))) { zip="300"; city="新竹市"; area="北區"; }
        else if (full.includes("東區") && (full.includes("新竹") || city.includes("新竹"))) { zip="300"; city="新竹市"; area="東區"; }
        else if (full.includes("頭份")) { zip="351"; city="苗栗縣"; area="頭份市"; }

        state[dId] = `${zip} ${city} ${area}`.trim();
        state[aId] = place.name || "";
        document.getElementById(dId).value = state[dId];
        calculatePrice();
        updateExtraDistance();
      };
      const setupAC = (id, dId, aId) => {
        const ac = new google.maps.places.Autocomplete(document.getElementById(id), { componentRestrictions:{country:'tw'} });
        ac.addListener('place_changed', () => {
          const p = ac.getPlace();
          if (p && p.address_components) parse(p, dId, aId);
        });
      };
      if (!window.google) {
        const s = document.createElement('script');
        s.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=places&language=zh-TW`;
        s.onload = () => { setupAC('address','district','address'); setupAC('extraAddress','extraDistrict','extraAddress'); };
        document.head.appendChild(s);
      } else { setupAC('address','district','address'); setupAC('extraAddress','extraDistrict','extraAddress'); }
    }

    async function loadPrices() {
      try {
        const res = await fetch(`${GAS_WEBAPP_URL}?action=getPrices&t=${Date.now()}`);
        const d = await res.json();
        if (d.status === 'success') { 
          const prices = {};
          d.prices.forEach(it => prices[`${it.a}_${it.c}`] = it);
          state.priceMap = prices; 
          calculatePrice(); 
        }
      } catch(e) { console.warn('報價載入失敗'); }
    }

    window.onload = () => {
      state.reservationId = generateId();
      DOM.displayId.innerText = state.reservationId;
      for(let i=0; i<24; i++) DOM.timeHour.add(new Option(String(i).padStart(2,'0'), String(i).padStart(2,'0')));
      for(let i=0; i<60; i+=5) DOM.timeMinute.add(new Option(String(i).padStart(2,'0'), String(i).padStart(2,'0')));
      DOM.timeHour.value = "12"; DOM.timeMinute.value = "00";
      loadPrices();
      initGoogleMaps();
      if(typeof liff !== 'undefined') liff.init({ liffId: LINE_LIFF_ID });
    };

    function updateOptions() {
      const render = (el, max) => {
        const val = el.value; el.innerHTML = '';
        for(let i=0; i<=max; i++) el.add(new Option(i,i));
        el.value = (parseInt(val) <= max) ? val : 0;
      };
      render(DOM.adults, 6); render(DOM.children, 6); render(DOM.infants, 6);
      render(DOM.carryOn, 6); render(DOM.checkedBag, 6);
      
      const tp = (parseInt(DOM.adults.value)||0) + (parseInt(DOM.children.value)||0) + (parseInt(DOM.infants.value)||0);
      const infants = parseInt(DOM.infants.value) || 0;
      state.infants = infants;
      
      let force = (tp > 4) || (tp === 4 && infants > 0);
      if(force) { 
        state.carType = '大車'; DOM.carType.value = '大車'; DOM.carType.disabled = true; 
        DOM.carTypeMsg.innerText = `※ 人數/安全座椅需求強制使用大車`; 
        DOM.carTypeMsg.classList.remove('hidden-block'); 
      } else { DOM.carType.disabled = false; DOM.carTypeMsg.classList.add('hidden-block'); }
      calculatePrice();
    }

    // 監聽基本欄位
    ['name','email','date','timeHour','timeMinute','serviceType','airport','carType','payment','flightNumber'].forEach(id => {
      document.getElementById(id).addEventListener('change', (e) => { state[id] = e.target.value; calculatePrice(); });
    });
    
    document.getElementById('phone').oninput = (e) => { e.target.value = e.target.value.replace(/\D/g, '').slice(0, 10); state.phone = e.target.value; };
    [DOM.adults, DOM.children, DOM.infants, DOM.carryOn, DOM.checkedBag].forEach(el => el.onchange = updateOptions);
    
    DOM.hasExtraPoint.onchange = (e) => { 
      state.hasExtraPoint = e.target.checked; 
      DOM.extraPointBlock.className = e.target.checked ? 'mt-4 space-y-2' : 'hidden-block'; 
      updateExtraDistance(); 
    };
    
    DOM.extraSignboard.onchange = (e) => {
      state.extraSignboard = e.target.checked;
      DOM.signboardText.className = e.target.checked ? 'w-full mt-2 p-3 border rounded-sm outline-none focus:border-[#553f62] bg-white text-base' : 'hidden-block';
      calculatePrice();
    };
    
    DOM.signboardText.oninput = (e) => { state.signboardText = e.target.value; };
    document.getElementById('userRemarks').oninput = (e) => { state.userRemarks = e.target.value; };

    // 表單送出
    document.getElementById('reservation-form').onsubmit = async (e) => {
      e.preventDefault();
      
      // 基本驗證
      if (!state.name || state.phone.length < 10 || !state.district) {
        return Swal.fire('資訊不完整','請填寫全名、正確電話(10碼)與選取地址','error');
      }
      
      // 舉牌驗證
      if (state.extraSignboard && !state.signboardText.trim()) {
        return Swal.fire('資訊不完整','您已勾選舉牌服務，請填寫舉牌內容','error');
      }
      
      if (!document.getElementById('agreed').checked) {
        return Swal.fire('提醒','請勾選同意條款','info');
      }

      DOM.submitBtn.disabled = true; 
      DOM.submitBtn.innerText = "傳送中...";
      
      const totalText = DOM.displayTotal.innerText;
      const formattedTime = `${state.timeHour}:${state.timeMinute}`;
      const fPhone = formatPhone(state.phone);
      
      // 準備發送給 LINE 的文字
      const msg = `【安星租車 預約成功】\n` +
                  `預約編號：${state.reservationId}\n` +
                  `乘車人：${state.name} ${state.title}\n` +
                  `聯絡電話：${fPhone}\n` +
                  `乘車日期：${state.date} ${formattedTime}\n` +
                  `行程內容：${state.serviceType} (${state.airport})\n` +
                  `航班編號：${state.flightNumber || '無'}\n` +
                  `出發地點：${state.district} ${state.address}\n` +
                  `加點地址：${state.hasExtraPoint ? (state.extraDistrict + ' ' + state.extraAddress) : '無'}\n` +
                  `預約車型：${state.carType}\n` +
                  `乘客行李：${state.adults}大${state.children}小${state.infants}幼 / ${state.carryOn}登${state.checkedBag}託\n` +
                  `舉牌內容：${state.extraSignboard ? state.signboardText : '無'}\n` +
                  `費用總額：${totalText}\n` +
                  `付款方式：${state.payment.split('(')[0]}\n` +
                  `備註事項：${state.userRemarks || '無'}`;

      const second = `您的預約已成功送出。\n請您耐心等候，待客服人員為您確認訂單內容無誤後，將回傳轉帳帳號／刷卡QR Code以利完成付款，感謝您的配合。`;

      // 準備發送給 Google Sheets 的固定格式資料 (確保欄位固定)
      const postData = {
        action: 'addReservation',
        data: {
          timestamp: new Date().toLocaleString('zh-TW', {hour12: false}),
          reservationId: state.reservationId,
          name: `${state.name} ${state.title}`,
          phone: fPhone,
          email: state.email || '無',
          date: state.date,
          time: formattedTime,
          serviceType: state.serviceType,
          airport: state.airport,
          flightNumber: state.flightNumber || '無',
          mainAddress: `${state.district} ${state.address}`,
          hasExtraPoint: state.hasExtraPoint ? '是' : '否',
          extraAddress: state.hasExtraPoint ? `${state.extraDistrict} ${state.extraAddress}` : '無',
          carType: state.carType,
          passengers: `${state.adults}大 ${state.children}小 ${state.infants}幼`,
          luggage: `${state.carryOn}登 ${state.checkedBag}託`,
          extraSignboard: state.extraSignboard ? '是' : '否',
          signboardText: state.extraSignboard ? state.signboardText : '無',
          totalFee: totalText,
          payment: state.payment,
          remarks: state.userRemarks || '無'
        }
      };

      try {
        await fetch(GAS_WEBAPP_URL, { 
          method:'POST', 
          mode:'no-cors', 
          body: JSON.stringify(postData)
        });

        if (window.liff && liff.isInClient()) {
          await liff.sendMessages([{type:'text', text:msg}, {type:'text', text:second}]);
          document.getElementById('view-form').classList.add('hidden-block');
          document.getElementById('view-done').classList.replace('hidden-block','flex');
          setTimeout(() => liff.closeWindow(), 3000);
        } else {
          document.getElementById('view-form').classList.add('hidden-block');
          document.getElementById('view-success').classList.remove('hidden-block');
          document.getElementById('fallback-message').innerText = msg;
        }
      } catch(err) { 
        Swal.fire('傳送失敗','伺服器連線異常，請稍後重試','error'); 
        DOM.submitBtn.disabled = false; 
        DOM.submitBtn.innerText = "確認預約並送出"; 
      }
    };
    
    updateOptions();
  </script>
</body>
</html>
